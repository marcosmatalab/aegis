name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package (with dev extras)
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Run tests
        run: pytest

  eval-gate:
    # F7: block the PR on an eval regression vs the committed baseline. Runs the
    # DETERMINISTIC, offline MockJudge/MockProvider — no key, no SDK, no network.
    # Independent of lint-and-test (no `needs:`) so both signal in parallel.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package (with dev extras)
        run: pip install -e ".[dev]"

      - name: Eval regression gate (offline, mock vs committed baseline)
        run: aegis eval gate

  redteam-gate:
    # F7: block the PR on a red-team regression vs the committed baseline. Scores the
    # attack catalog against the F2 guardrails on the HERMETIC offline pipeline
    # (build_redteam_settings pins every field — no key, no SDK, no network). No
    # --update-baseline, so a weaken-without-rebaseline is a hard red. Independent of
    # the other jobs (no `needs:`) so all signal in parallel.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package (with dev extras)
        run: pip install -e ".[dev]"

      - name: Red-team regression gate (offline, catalog vs committed baseline)
        run: aegis redteam gate

  dashboard:
    # F9: lint + typecheck + unit-test + build the read-only dashboard. Pure Node,
    # fully offline — npm ci from the committed lockfile; no collector/provider/model
    # or network at test/build time (the page reads reports/ only at request time).
    # Independent of the Python jobs (no `needs:`) so all three signal in parallel.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install (clean, from lockfile)
        run: npm ci

      - name: Lint (Biome)
        run: npm run lint

      - name: Typecheck (tsc)
        run: npm run typecheck

      - name: Unit tests (Vitest)
        run: npm test

      - name: Build (offline)
        run: npm run build
