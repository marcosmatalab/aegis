name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package (with dev extras)
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Run tests
        run: pytest

  eval-gate:
    # F7: block the PR on an eval regression vs the committed baseline. Runs the
    # DETERMINISTIC, offline MockJudge/MockProvider — no key, no SDK, no network.
    # Independent of lint-and-test (no `needs:`) so both signal in parallel.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package (with dev extras)
        run: pip install -e ".[dev]"

      - name: Eval regression gate (offline, mock vs committed baseline)
        run: aegis eval gate
